ci:
  image: buildpack-deps:noble@sha256:00a94711183f6a20bc2ed06e90f98250961cb99aff7068ceda34ab1f88e161f7
  services:
    - docker:29.3.0-dind@sha256:1ba18449911d01f477a3fc104123c85d677addc60701b14b3fcb5381f9c4a537
  retry:
    max: 2
    when:
      - runner_system_failure
  before_script:
    - ./tools/install_ubuntu_packages.sh
    - ./tools/install_act.sh
    - timeout 600 sh -c 'until docker info --format "{{ .OperatingSystem }}"; do sleep 1; done'
  script:
    - ./.local/bin/act
