ci:
  image: cimg/node:lts@sha256:5ee681fd1421b7555c4a6598689fd1258ab27e9fbeb5ccdb6ac56311e087805a
  services:
    - docker:29.3.1-dind@sha256:4d90f1f6c400315c2dba96d3ec93c01e64198395cbba04f79d12adce4f737029
  retry:
    max: 2
    when:
      - runner_system_failure
  before_script:
    - sudo ./tools/install_ubuntu_packages.sh
    - ./tools/install_act.sh
    - timeout 600 sh -c 'until docker info --format "{{ .OperatingSystem }}"; do sleep 1; done'
  script:
    - ./.local/bin/act
