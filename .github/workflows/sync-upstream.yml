name: Sync upstream

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  open-sync-pull-request:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      UPSTREAM_REPOSITORY: saturday06/VRM-Addon-for-Blender
      UPSTREAM_BRANCH: main

    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch --no-tags upstream "${UPSTREAM_BRANCH}"

      - name: Check for upstream commits
        id: changes
        shell: bash
        run: |
          count="$(git rev-list --count "origin/${GITHUB_REF_NAME}..upstream/${UPSTREAM_BRANCH}")"
          if [[ "${count}" == "0" ]]; then
            echo "No new upstream commits."
            echo "available=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Found ${count} new upstream commit(s)."
            echo "available=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create synchronization branch
        if: steps.changes.outputs.available == 'true'
        id: branch
        shell: bash
        run: |
          branch="sync/upstream-${UPSTREAM_BRANCH}-${GITHUB_RUN_ID}"
          git switch --create "${branch}" "origin/${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git merge --no-edit "upstream/${UPSTREAM_BRANCH}"; then
            git merge --abort
            echo "::error::Upstream merge has conflicts. Sync manually."
            exit 1
          fi

          git push origin "${branch}"
          echo "name=${branch}" >> "${GITHUB_OUTPUT}"

      - name: Open synchronization pull request
        if: steps.changes.outputs.available == 'true'
        run: |
          gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "${{ steps.branch.outputs.name }}" \
            --title "chore: sync upstream ${UPSTREAM_BRANCH}" \
            --body "$(cat <<'EOF'
          ## Summary
          - Merge the latest `saturday06/VRM-Addon-for-Blender` changes.
          - Preserve Extended VRM changes for review before integration.

          ## Test plan
          - [ ] Required checks pass.
          - [ ] Extended VRM patches still apply as intended.

          Created by the scheduled upstream synchronization workflow.
          EOF
          )"
