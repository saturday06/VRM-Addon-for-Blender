name: benchmark

permissions: {}

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    if: ${{ vars.ENABLE_VRM_BENCHMARK_WORKFLOW_BENCHMARK_JOB == 'true' }}
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        env:
          BENCHMARK_PYTHON_VERSION: "3.13" # Set as environment variable to prevent automatic updates by renovate
        with:
          # For reasons unknown, flamegraphs cannot be generated with Codspeed unless Python is installed via
          # actions/setup-python.
          python-version: ${{ env.BENCHMARK_PYTHON_VERSION }}
      # CodSpeed can only generate flamegraphs with Python 3.12 or later
      - run: git ls-files pyproject.toml "**/pyproject.toml" | xargs sed -i~ 's/^requires-python = "==3\.10\.\*" /requires-python = "==3.13.*" /'
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - run: uv sync --no-managed-python
      - run: git diff
      - uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4.18.1
        with:
          mode: simulation
          run: uv run pytest src/ --codspeed
          working-directory: benchmarks
